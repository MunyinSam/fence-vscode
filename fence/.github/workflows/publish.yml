name: Publish

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.5, v1.2.0, etc.

jobs:
  publish:
    name: Build & publish to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Publish to Marketplace
        run: npx vsce publish --no-git-tag-version
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
